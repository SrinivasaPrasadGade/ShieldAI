networks:
  shield_net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    networks:
      - shield_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON}
      - FIREBASE_CREDENTIALS_B64=${FIREBASE_CREDENTIALS_B64}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - SQLITE_DB_PATH=/app/data/shield_ai.db
      - ENABLE_BERT=${ENABLE_BERT:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
    volumes:
      - ./backend/data:/app/data
    networks:
      - shield_net
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  realtime:
    build:
      context: .
      dockerfile: backend/Dockerfile.realtime
    ports:
      - "5001:5001"
    environment:
      - REDIS_URL=redis://redis:6379
      - FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON}
      - FIREBASE_CREDENTIALS_B64=${FIREBASE_CREDENTIALS_B64}
      - SQLITE_DB_PATH=/app/data/shield_ai.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - shield_net
    depends_on:
      redis:
        condition: service_healthy
    command: python realtime_server.py

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
      args:
        ENABLE_ZERO_SHOT: ${ENABLE_ZERO_SHOT:-false}
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON}
      - FIREBASE_CREDENTIALS_B64=${FIREBASE_CREDENTIALS_B64}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - SQLITE_DB_PATH=/app/data/shield_ai.db
      - ENABLE_BERT=${ENABLE_BERT:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379
      - ENABLE_ZERO_SHOT=${ENABLE_ZERO_SHOT:-false}
      - ZERO_SHOT_MODEL=${ZERO_SHOT_MODEL:-facebook/bart-large-mnli}
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    volumes:
      - ./backend/data:/app/data
    networks:
      - shield_net
    user: "1000:1000"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.frontend
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_REALTIME_URL=http://localhost:5001
      - VITE_FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - VITE_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
    networks:
      - shield_net
    depends_on:
      - api
      - realtime
    command: npm run dev -- --host 0.0.0.0
